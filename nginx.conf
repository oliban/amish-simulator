server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Unity WebGL requires specific MIME types
    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js;
        application/wasm            wasm;
        application/octet-stream    data;
        application/json            json;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        image/svg+xml               svg;
        audio/mpeg                  mp3;
        audio/ogg                   ogg;
        font/woff2                  woff2;
    }

    # Required for Unity WebGL threading (SharedArrayBuffer)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Cache static assets aggressively, never cache index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location ~* \.(wasm|data|js|framework\.js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Handle Brotli-compressed Unity builds
    location ~* \.wasm\.br$ {
        add_header Content-Encoding br;
        add_header Content-Type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location ~* \.js\.br$ {
        add_header Content-Encoding br;
        add_header Content-Type application/javascript;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location ~* \.data\.br$ {
        add_header Content-Encoding br;
        add_header Content-Type application/octet-stream;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Handle gzip-compressed Unity builds
    location ~* \.wasm\.gz$ {
        add_header Content-Encoding gzip;
        add_header Content-Type application/wasm;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location ~* \.js\.gz$ {
        add_header Content-Encoding gzip;
        add_header Content-Type application/javascript;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location ~* \.data\.gz$ {
        add_header Content-Encoding gzip;
        add_header Content-Type application/octet-stream;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
